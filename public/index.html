ay:flex;gap:12px;flex-wrap:wrap;align-items:center}.split{display:grid;grid-template-columns:minmax(280px,.9fr) minmax(320px,1.1fr);gap:20px}.store{text-align:center}.avatar{width:84px;height:84px;border-radius:50%;object-fit:cover}.sticky{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--wa);color:white;display:flex;align-items:center;justify-content:center;gap:8px;z-index:10;font-weight:800;text-decoration:none}.qr{width:160px;height:160px;background:#fff;padding:8px;border-radius:16px}.step:before{content:attr(data-step);display:grid;place-items:center;width:34px;height:34px;background:var(--accent);color:#fff;border-radius:50%;font-weight:800}.hidden{display:none!important}@media(max-width:760px){.split{grid-template-columns:1fr}.hero{padding-top:24px}.wrap{padding:18px 14px}}
</style></head><body><nav><a class="brand" href="#/">zippp.link</a><span></span><a href="#/pricing">Harga</a><a href="#/app">App</a></nav><main id="app"></main><footer>zippp.link — Linktree starts links. zippp.link starts sales.</footer><a class="sticky" id="sticky" href="https://wa.me/6281234567890?text=Halo%20zippp.link%20mau%20buat%20halaman%20jualan">☘ Chat zippp.link</a><script>
const templates=[{key:'kopispot',name:'KopiSpot',niche:'Coffee',accent:'#92400E',store:'Kopi Senja',category:'Kedai Kopi',desc:'Kopi susu kekinian, harga bersahabat.',hero:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=900&q=80',blocks:['Buka: Senin-Minggu, 07:00-21:00','Food Market Ngagel, Blok C12','Buy 2 Get 1 Free every Tuesday'],cta:'Pesan via WhatsApp',message:'Halo Kopi Senja! Mau pesan ',products:[['Kopi Susu Gula Aren','Rp18.000','Paling laris! Espresso + susu segar + gula aren','https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=700&q=80','Paling Laris'],['Kopi Susu Klepon','Rp20.000','Menu baru rasa klepon autentik','https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&w=700&q=80','Baru'],['Americano','Rp15.000','Ice/Hot. Biji kopi pilihan.','https://images.unsplash.com/photo-1494314671902-399b18174975?auto=format&fit=crop&w=700&q=80',''],['Paket Ngopi Hemat','Rp28.000','2 Kopi Susu + 1 Pisang Goreng','https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=700&q=80','Combo']]},{key:'dapurkit',name:'DapurKit',niche:'Food',store:'Nasi Box Sari',category:'Makanan Rumahan',desc:'Masakan rumah sehat, enak, & mengenyangkan.',hero:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=900&q=80',blocks:['Buka Hari Ini: 07:00 - 21:00','Delivery: Bintaro, BSD, Tangsel','Pilih menu → Chat WA → Diantar'],cta:'Pesan via WhatsApp',message:'Halo Nasi Box Sari! Aku mau pesan ',products:[['Nasi Rendang Komplit','Rp28.000','Nasi + rendang + sayur + sambal','https://images.unsplash.com/photo-1569058242567-93de6f36f8eb?auto=format&fit=crop&w=700&q=80','Special'],['Nasi Ayam Goreng Kremes','Rp25.000','Nasi + ayam goreng + lalapan','https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=700&q=80','Best Seller']]},{key:'ovencraft',name:'OvenCraft',niche:'Bakery',store:"Dina's Bakehouse",category: const $=s=>document.querySelector(s), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])), slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,48)||'tokoku';
function pageData(){return JSON.parse(localStorage.zipppPage||'null')} function save(p){localStorage.zipppPage=JSON.stringify(p)}
function sales(t,p=t){let products=p.products||t.products;return `<section class="wrap"><div class="store"><img class="avatar" src="${esc(p.hero||t.hero)}"><h1>${esc(p.store||t.store)}</h1><p class="muted">@${slug(p.store||t.store)}</p><p><span class="pill">${esc(p.category||t.category)}</span> <span class="pill"><span class="dot"></span>Open Now</span></p><p>${esc(p.desc||t.desc)}</p></div><div class="grid">${(p.blocks||t.blocks).map(b=>`<div class="panel"><b>${esc(b)}</b></div>`).join('')}</div><h2>Produk</h2><div class="grid">${products.map((x,i)=>`<article class="card product"><img src="${esc(x[3]||t.hero)}" alt="${esc(x[0])}"><div class="content">${x[4]?`<span class="badge">${esc(x[4])}</span>`:''}<h3>${esc(x[0])}</h3><p class="price">${esc(x[1])}</p><p class="muted">${esc(x[2])}</p><a class="btn wa" target="_blank" href="https://wa.me/${esc((p.phone||'6281234567890').replace(/\D/g,''))}?text=${encodeURIComponent((t.message||'Halo! Aku mau pesan ')+x[0])}">☘ ${esc(t.cta)}</a></div></article>`).join('')}</div><p class="muted">Powered by zippp.link</p></section>`}
function home(){let t=templates[0];return `<section class="hero wrap"><span class="pill"><span class="dot"></span> Vercel deployment live</span><h1>Linktree starts links. zippp.link starts sales.</h1><p class="lead">Buat halaman produk cantik, bagikan ke Instagram/QR, dan biarkan pembeli langsung chat WhatsApp dengan pesan otomatis.</p><div class="row"><a class="btn wa" href="#/app">Buat Halaman Gratis</a><a class="btn" href="#/demo">Lihat Demo</a></div><p class="muted">Free forever. No credit card. 30-second setup.</p></section><section class="wrap grid"><div class="card step" data-step="1"><h3>Add Products</h3><p>Foto, nama, harga, deskripsi.</p></div><div class="card step" data-step="2"><h3>Share Link</h3><p>Bio Instagram, WhatsApp, dan QR.</p></div><div class="card step" data-step="3"><h3>Get Orders</h3><p>Chat WhatsApp sudah terisi otomatis.</p></div></section><h2 class="wrap">Live demo</h2>${sales(t)}`}
function pricing(){return `<section class="wrap"><h1>Founding Member</h1><p class="lead">Harga micro-seller: tetap $12/tahun atau $49 lifetime.</p><div class="grid"><div class="card"><h2>Free</h2><p class="price">$0</p><p>1 page, 6 products, QR sharing.</p><a class="btn" href="#/app">Start</a></div><div class="card"><h2>Pro Yearly</h2><p class="price">$12/year</p><p>3 pages, 100 products, analytics, remove branding.</p><a class="btn wa" href="https://wa.me/6281234567890?text=Halo%20zippp.link%20mau%20upgrade%20yearly">Upgrade</a></div><div class="card"><h2>Pro Lifetime</h2><p class="price">$49 one-time</p><p>Keep Pro forever.</p><a class="btn wa" href="https://wa.me/6281234567890?text=Halo%20zippp.link%20mau%20Lifetime%20Pro">Buy</a></div></div></section>`}
function app(){let p=pageData();if(!p){return `<section class="wrap"><h1>What do you sell?</h1><p class="lead">Pilih template. Kami isi otomatis produk contoh agar bisa publish di bawah 2 menit.</p><div class="grid">${templates.map(t=>`<button class="card" onclick="start('${t.key}')"><img class="hero-img" src="${t.hero}"><h2>${t.name}</h2><p>${t.niche}</p></button>`).join('')}</div></section>`}return `<section class="wrap"><h1>Split-screen Editor</h1><div class="split"><form class="panel" onsubmit="update(event)"><label>Nama toko</label><input name="store" value="${esc(p.store)}"><label>WhatsApp</label><input name="phone" value="${esc(p.phone)}"><label>Deskripsi</label><textarea name="desc">${esc(p.desc)}</textarea><button>Simpan</button><h2>QR Code</h2><img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(location.origin+'/#/my-page')}"><p><a class="btn" href="#/my-page">Public preview</a></p><p><button type="button" onclick="localStorage.removeItem('zipppPage');route()">Reset</button></p></form><section>${sales(templates.find(t=>t.key===p.key)||templates[0],p)}</section></div></section>`}
function start(k){let t=templates.find(x=>x.key===k);save({...t,key:k,phone:'6281234567890'});route()} function update(e){e.preventDefault();let p=pageData(),f=new FormData(e.target);save({...p,store:f.get('store'),phone:f.get('phone'),desc:f.get('desc')});route()}
function route(){let r=(location.hash||'#/').slice(2);let p=pageData();$('#app').innerHTML=r==='pricing'?pricing():r==='app'?app():r==='demo'?sales(templates[0]):r==='my-page'&&p?sales(templates.find(t=>t.key===p.key)||templates[0],p):home()} addEventListener('hashchange',route);route();
